{% extends "base.html" %}

{% block content %}
<div class="bg-white min-h-screen pt-16 pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center">
            <div class="flex items-center justify-center h-24 w-24 bg-green-100 rounded-full mx-auto">
                <svg class="h-12 w-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="mt-6 text-4xl font-extrabold text-slate-900 tracking-tight sm:text-5xl">Request Submitted!</h1>
            <p class="mt-4 text-lg text-slate-500">
                Your customization request for <span class="font-semibold text-slate-900">{{ template.name }}</span> has been received.
            </p>
            <p class="mt-2 text-slate-500">
                Our team will review your requirements and get back to you at <strong>{{ user.email }}</strong> within 24-48 hours.
            </p>
            <div class="mt-10 flex justify-center space-x-4">
                <a href="{% url 'templates_catalog:template_list' %}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-indigo-700 bg-indigo-100 hover:bg-indigo-200">
                    Browse More Templates
                </a>
                <a href="/" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
