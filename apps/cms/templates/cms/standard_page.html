{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<div class="bg-white">
    <div class="max-w-3xl mx-auto py-16 px-4 sm:py-24 sm:px-6 lg:px-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 sm:text-5xl sm:tracking-tight lg:text-6xl">
                {{ page.title }}
            </h1>
        </div>
        <div class="mt-12 prose prose-indigo prose-lg text-slate-500">
            {% for block in page.body %}
                {% include_block block %}
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
