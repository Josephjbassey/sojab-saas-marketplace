{% extends 'layouts/base.html' %}
{% load wagtailcore_tags %}

{% block content %}
<div class="bg-white px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
        <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-6xl">{{ page.title }}</h1>
        <div class="mt-6 text-lg leading-8 text-gray-600">
            {{ page.body|richtext }}
        </div>
        <div class="mt-10 flex items-center justify-center gap-x-6">
            <a href="{% url 'dashboard:index' %}" class="rounded-md bg-primary px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">Go to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
